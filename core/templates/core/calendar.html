{% extends "core/base.html" %}
{% load static %}

{% block title %}대회 캘린더{% endblock %}

{% block head %}
    {{ block.super }}
    <meta name="description" content="전국 배드민턴 대회 일정을 한눈에 보는 캘린더. 위꾹, 스포넷, 우동배, 페이스콕, 배프 통합 정보를 확인하세요.">
    
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>

    <style type="text/tailwindcss">
        /* Toss 스타일 캘린더 커스텀 */
        .fc { @apply border-none font-sans; --fc-border-color: #f2f4f6; }
        .dark .fc { --fc-border-color: #333d4b; }
        
        .fc-toolbar-title { @apply text-xl font-bold !text-tossGray-900 dark:!text-white; }
        .fc-button { @apply !bg-tossGray-100 !border-none !text-tossGray-700 !font-bold !rounded-xl transition-all hover:!bg-tossGray-200 active:!scale-95; }
        .dark .fc-button { @apply !bg-white/5 !text-tossGray-400 hover:!bg-white/10; }
        
        /* 날짜 숫자 스타일 */
        .fc-daygrid-day-number { @apply p-2 text-sm font-medium text-tossGray-600 dark:text-tossGray-400; }
        .fc-day-today { @apply !bg-tossBlue/5; }
        
        .fc-event { @apply cursor-pointer; }
        .fc-daygrid-event { @apply overflow-hidden whitespace-nowrap text-ellipsis; }
        .fc-daygrid-event-harness { @apply mb-[2px]; }
        
        /* 목록 뷰 최적화 */
        .fc-list-event-time { display: none !important; }
        .fc-list-table { @apply !border-none; }
        .fc-list-day-cushion { @apply bg-tossGray-100 dark:bg-zinc-800 !py-3; }
        
        /* 모바일 리스트 아이템 */
        .sp-item { @apply mb-1 p-4 rounded-xl bg-tossGray-50 dark:bg-white/5 border border-black/[0.03] dark:border-white/[0.05]; }
    </style>
{% endblock %}

{% block content %}
<section class="py-4 space-y-2">
    <h1 class="toss-title">대회 캘린더</h1>
    <p class="text-sm font-medium text-tossGray-500">
        전국 <strong>배드민턴 대회 일정</strong>을 한눈에 확인하세요.<br>
        <span class="text-tossBlue text-xs">TIP: 날짜를 클릭하면 상세 목록을 볼 수 있습니다.</span>
    </p>
</section>

<section class="flex flex-wrap gap-2 mb-4">
    <div class="flex items-center gap-1.5 px-3 py-1.5 bg-white dark:bg-zinc-800 rounded-full text-[11px] font-bold shadow-sm border border-black/5 dark:border-white/5">
        <span class="w-2 h-2 rounded-full bg-[#2563eb]"></span> 페이스콕
    </div>
    <div class="flex items-center gap-1.5 px-3 py-1.5 bg-white dark:bg-zinc-800 rounded-full text-[11px] font-bold shadow-sm border border-black/5 dark:border-white/5">
        <span class="w-2 h-2 rounded-full bg-[#16a34a]"></span> 우동배
    </div>
    <div class="flex items-center gap-1.5 px-3 py-1.5 bg-white dark:bg-zinc-800 rounded-full text-[11px] font-bold shadow-sm border border-black/5 dark:border-white/5">
        <span class="w-2 h-2 rounded-full bg-[#ef4444]"></span> 스포넷
    </div>
    <div class="flex items-center gap-1.5 px-3 py-1.5 bg-white dark:bg-zinc-800 rounded-full text-[11px] font-bold shadow-sm border border-black/5 dark:border-white/5">
        <span class="w-2 h-2 rounded-full bg-[#f97316]"></span> 위꾹
    </div>
    <div class="flex items-center gap-1.5 px-3 py-1.5 bg-white dark:bg-zinc-800 rounded-full text-[11px] font-bold shadow-sm border border-black/5 dark:border-white/5">
        <span class="w-2 h-2 rounded-full bg-[#8b5cf6]"></span> 배프
    </div>
</section>

<div class="toss-card !p-4 overflow-hidden bg-white dark:bg-zinc-900 shadow-sm border border-black/5 dark:border-white/5 rounded-2xl">
    <div id="calendar"></div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
document.addEventListener("DOMContentLoaded", function () {
    const calendarEl = document.getElementById("calendar");
    
    // 결정론적 컬러 맵핑 테이블
    const SOURCE_COLORS = {
        "FACECOK": "#2563eb", 
        "NEARMINTON": "#16a34a", 
        "SPONET": "#ef4444", 
        "WEEKUK": "#f97316", 
        "BAEF": "#8b5cf6"
    };
    const SOURCE_LABELS = {
        "FACECOK": "페이스콕", "NEARMINTON": "우동배", "SPONET": "스포넷", 
        "WEEKUK": "위꾹", "BAEF": "배프"
    };

    const isMobile = window.matchMedia("(max-width: 768px)").matches;

    const calendar = new FullCalendar.Calendar(calendarEl, {
        initialView: isMobile ? "listMonth" : "dayGridMonth",
        locale: "ko",
        height: "auto",
        dayMaxEvents: 3,           
        moreLinkClick: "popover",  
        eventDisplay: "list-item", 
        headerToolbar: {
            left: "prev,next today",
            center: "title",
            right: isMobile ? "" : "dayGridMonth,listMonth"
        },
        buttonText: { today: "오늘", month: "월", list: "목록" },
        events: "{% url 'core:calendar_events' %}",

        dateClick: function(info) {
            window.location.href = "/calendar/day/" + info.dateStr + "/";
        },

        eventClick: function(info) {
            info.jsEvent.preventDefault(); 
            const url = info.event.url || (info.event.extendedProps && info.event.extendedProps.external_url);
            if (url) {
                window.open(url, '_blank', 'noopener,noreferrer');
            }
        },

        eventDidMount: function (info) {
            const props = info.event.extendedProps || {};
            const src = (props.source || "").toUpperCase();
            const color = SOURCE_COLORS[src] || "#b0b8c1";

            // 1. 공통 속성 부여
            info.el.setAttribute("title", info.event.title);

            // 2. 월간 뷰(DayGrid) 점 색상 교정
            const dotEl = info.el.querySelector('.fc-daygrid-event-dot');
            if (dotEl) dotEl.style.borderColor = color;

            // 3. 목록 뷰(List) 점 색상 교정 (데스크탑 리스트 뷰 대응)
            const listDotEl = info.el.querySelector('.fc-list-event-dot');
            if (listDotEl) listDotEl.style.borderColor = color;

            // 4. 모바일 환경 전용 커스텀 레이아웃
            if (isMobile) {
                const titleTd = info.el.querySelector(".fc-list-event-title");
                if (titleTd) {
                    const titleText = info.event.title;
                    const loc = props.region || "전국";

                    titleTd.innerHTML = `
                        <div class="sp-item cursor-pointer">
                            <div class="flex justify-between items-start mb-2">
                                <span class="text-[10px] font-bold px-2 py-0.5 rounded-md text-white" style="background-color: ${color}">
                                    ${SOURCE_LABELS[src] || src}
                                </span>
                                <span class="text-[10px] text-tossGray-400 font-medium">${loc}</span>
                            </div>
                            <h4 class="text-sm font-bold text-tossGray-900 dark:text-white leading-snug">${titleText}</h4>
                        </div>
                    `;
                    info.el.style.background = "transparent";
                    
                    // 모바일 리스트에서 기본 점 숨김 (카드 내부에 배지가 있으므로)
                    const graphicEl = info.el.querySelector(".fc-list-event-graphic");
                    if (graphicEl) graphicEl.style.display = "none";
                }
            } else {
                // 데스크탑 환경에서는 텍스트 컬러 유동적 상속
                info.el.style.color = 'inherit';
            }
        }
    });

    calendar.render();
});
</script>
{% endblock %}
