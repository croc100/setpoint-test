{% extends "core/base.html" %}

{% block title %}삭제 확인{% endblock %}

{% block content %}
<div class="max-w-md mx-auto space-y-5">

  <div class="toss-card text-center space-y-4 py-8">
    <div class="text-4xl">🗑️</div>
    <div>
      <h2 class="text-lg font-black text-tossGray-900 dark:text-white">정말 삭제할까요?</h2>
      <p class="mt-2 text-sm text-tossGray-500">
        <span class="font-bold text-tossGray-800 dark:text-tossGray-200">{{ item_name }}</span>
      </p>
      <p class="mt-1 text-xs text-red-400 font-medium">이 작업은 되돌릴 수 없어요.</p>
    </div>

    <form method="post" class="flex gap-3 justify-center pt-2">
      {% csrf_token %}
      <a href="{{ cancel_url }}"
         class="px-6 py-2.5 bg-tossGray-100 dark:bg-white/10 text-tossGray-600 dark:text-tossGray-300 rounded-xl text-sm font-bold hover:bg-tossGray-200 transition-colors">
        취소
      </a>
      <button type="submit"
              class="px-6 py-2.5 bg-red-500 text-white rounded-xl text-sm font-bold hover:bg-red-600 transition-colors">
        삭제
      </button>
    </form>
  </div>

</div>
{% endblock %}
